name: Ann Huang
tagline: Cognitive Science x HCI
career-objective: |
  Hey there 👋🏼 Thanks for dropping by. I am a PhD student at the Univeristy of Osnabrück [Institute of Cognitive Science](https://www.ikw.uni-osnabrueck.de/startseite.html). Previously I was a research assistant at the [LMU Munich Media Informatics Group](https://www.medien.ifi.lmu.de/index.xhtml.en).
  My research focuses on uncovering factors that influence *perception* and *decision-making*. Specifically, I investigate how interactions with people and systems improve socio-cognitive based design.

