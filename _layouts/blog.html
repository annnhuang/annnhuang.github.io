---
layout: compress
---

{% include head.html %}

<main>

  {% include header.html %}

  <div class="blog-grid">
    {% for post in site.posts %}
      <a href="{{ site.baseurl }}{{ post.url }}" class="blog-card">
        <div class="blog-card-image" style="background-image: url('{{ post.header_image }}');">
          <div class="blog-card-overlay">
            <time datetime="{{ post.date | date_to_xmlschema }}">
              {{ post.date | date: "%b %-d, %Y" }}
            </time>
            <h2>{{ post.title }}</h2>
          </div>
        </div>
      </a>
    {% endfor %}
  </div>

  <small class="blog-tags">
    {% for tag in site.tags %}
      {% assign tag_slug = tag | first %}
      <a href="{{ 'tagged/' | relative_url }}{{ tag_slug }}">#{{ tag_slug }}</a>
    {% endfor %}
  </small>

</main>

{% include footer.html %}
</body>
</html>
